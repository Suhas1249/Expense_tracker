                                                                            🗑️
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function AnalyticsTab({ transactions, settings, formatCurrency, formatDate }) {
            const [chartType, setChartType] = useState('pie');
            const [chartPeriod, setChartPeriod] = useState('month');

            useEffect(() => {
                const chartCanvas = document.getElementById('expense-chart');
                const categoryStats = document.getElementById('category-stats');

                const filterTransactionsByPeriod = (trans, period) => {
                    const today = new Date();
                    return trans.filter(t => {
                        const transDate = new Date(t.date);
                        if (period === 'week') {
                            const firstDayOfWeek = new Date(today.setDate(today.getDate() - today.getDay()));
                            return transDate >= firstDayOfWeek;
                        } else if (period === 'month') {
                            return transDate.getMonth() === today.getMonth() && transDate.getFullYear() === today.getFullYear();
                        } else if (period === 'year') {
                            return transDate.getFullYear() === today.getFullYear();
                        }
                        return true;
                    });
                };

                let filteredTransactions = filterTransactionsByPeriod(transactions, chartPeriod);
                const expenseTransactions = filteredTransactions.filter(t => t.type === 'expense');

                const categories = {};
                expenseTransactions.forEach(t => {
                    categories[t.category] = (categories[t.category] || 0) + t.amount;
                });

                const labels = Object.keys(categories).map(cat => (categoryIcons[cat] || '📌') + ' ' + (cat.charAt(0).toUpperCase() + cat.slice(1)));
                const data = Object.values(categories);
                const backgroundColors = Object.keys(categories).map(cat => categoryColors[cat] || '#b2bec3');

                if (window.chart) window.chart.destroy();

                const chartTextColor = document.documentElement.classList.contains('dark') ? '#ffffff' : '#666';

                if (chartType === 'pie') {
                    window.chart = new Chart(chartCanvas, {
                        type: 'pie',
                        data: {
                            labels,
                            datasets: [{ data, backgroundColor: backgroundColors, borderWidth: 1 }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'right', labels: { color: chartTextColor } } }
                        }
                    });
                } else if (chartType === 'bar') {
                    window.chart = new Chart(chartCanvas, {
                        type: 'bar',
                        data: {
                            labels,
                            datasets: [{ label: 'Expenses', data, backgroundColor: backgroundColors, borderWidth: 1 }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, ticks: { color: chartTextColor } },
                                x: { ticks: { color: chartTextColor } }
                            }
                        }
                    });
                } else if (chartType === 'line') {
                    const dateGroups = {};
                    filteredTransactions.forEach(t => {
                        const date = t.date;
                        if (!dateGroups[date]) dateGroups[date] = { income: 0, expense: 0 };
                        dateGroups[date][t.type] += t.amount;
                    });
                    const sortedDates = Object.keys(dateGroups).sort((a, b) => new Date(a) - new Date(b));
                    window.chart = new Chart(chartCanvas, {
                        type: 'line',
                        data: {
                            labels: sortedDates.map(date => formatDate(date)),
                            datasets: [
                                {
                                    label: 'Income',
                                    data: sortedDates.map(date => dateGroups[date].income),
                                    borderColor: 'rgb(46, 204, 113)',
                                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                                    tension: 0.1,
                                    fill: true
                                },
                                {
                                    label: 'Expenses',
                                    data: sortedDates.map(date => dateGroups[date].expense),
                                    borderColor: 'rgb(231, 76, 60)',
                                    backgroundColor: 'rgba(231, 76, 60, 0.1)',
                                    tension: 0.1,
                                    fill: true
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: { beginAtZero: true, ticks: { color: chartTextColor } },
                                x: { ticks: { color: chartTextColor } }
                            },
                            plugins: { legend: { labels: { color: chartTextColor } } }
                        }
                    });
                }

                categoryStats.innerHTML = '';
                Object.keys(categories).forEach(category => {
                    const amount = categories[category];
                    const totalExpenses = expenseTransactions.reduce((sum, t) => sum + t.amount, 0);
                    const percentage = totalExpenses > 0 ? ((amount / totalExpenses) * 100).toFixed(1) : 0;
                    const categoryEl = document.createElement('div');
                    categoryEl.className = 'bg-gray-50 dark:bg-gray-700 p-4 rounded-md shadow-sm text-center';
                    categoryEl.innerHTML = `
                        <div className="font-medium dark:text-white">${categoryIcons[category] || '📌'} ${category.charAt(0).toUpperCase() + category.slice(1)}</div>
                        <div className="text-indigo-600 dark:text-indigo-400">${formatCurrency(amount)} (${percentage}%)</div>
                    `;
                    categoryStats.appendChild(categoryEl);
                });
            }, [transactions, chartType, chartPeriod]);

            return (
                <div>
                    <div className="flex gap-4 mb-6">
                        <select
                            value={chartType}
                            onChange={(e) => setChartType(e.target.value)}
                            className="p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                        >
                            <option value="pie">Pie Chart</option>
                            <option value="bar">Bar Chart</option>
                            <option value="line">Line Chart</option>
                        </select>
                        <select
                            value={chartPeriod}
                            onChange={(e) => setChartPeriod(e.target.value)}
                            className="p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                        >
                            <option value="week">This Week</option>
                            <option value="month">This Month</option>
                            <option value="year">This Year</option>
                            <option value="all">All Time</option>
                        </select>
                    </div>
                    <div className="h-80 mb-6">
                        <canvas id="expense-chart"></canvas>
                    </div>
                    <h3 className="text-lg font-semibold mb-4 dark:text-white">Spending by Category</h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4" id="category-stats"></div>
                </div>
            );
        }

        function BudgetTab({ transactions, settings, formatCurrency }) {
            const currentMonthExpenses = transactions
                .filter(t => t.type === 'expense' && new Date(t.date).getMonth() === new Date().getMonth())
                .reduce((sum, t) => sum + t.amount, 0);

            const categories = {};
            transactions
                .filter(t => t.type === 'expense' && new Date(t.date).getMonth() === new Date().getMonth())
                .forEach(t => {
                    categories[t.category] = (categories[t.category] || 0) + t.amount;
                });

            const totalExpenses = Object.values(categories).reduce((sum, amount) => sum + amount, 0);
            const percentage = settings.budget > 0 ? Math.min((currentMonthExpenses / settings.budget) * 100, 100) : 0;
            const progressColor = percentage >= 90 ? 'bg-red-500' : percentage >= 70 ? 'bg-yellow-500' : 'bg-green-500';

            return (
                <div>
                    <h3 className="text-lg font-semibold mb-4 dark:text-white">Budget Status</h3>
                    <div className="bg-gray-200 dark:bg-gray-700 rounded-md h-6 mb-2 overflow-hidden">
                        <div
                            className={`${progressColor} h-full rounded-md transition-all duration-300`}
                            style={{ width: `${percentage}%` }}
                        ></div>
                    </div>
                    <div className="flex justify-between text-sm mb-6 dark:text-white">
                        <span>{formatCurrency(currentMonthExpenses)} spent</span>
                        <span>Budget: {formatCurrency(settings.budget)}</span>
                    </div>
                    <h3 className="text-lg font-semibold mb-4 dark:text-white">Category Budgets</h3>
                    {settings.budget <= 0 ? (
                        <p className="text-center text-gray-500 dark:text-white">
                            Set a monthly budget to enable category budgeting.
                        </p>
                    ) : (
                        <div className="space-y-4">
                            {Object.keys(categories).map(category => {
                                const amount = categories[category];
                                const percentage = totalExpenses > 0 ? (amount / totalExpenses) * 100 : 0;
                                const suggestedBudget = settings.budget * (percentage / 100);
                                return (
                                    <div key={category} className="bg-gray-50 dark:bg-gray-700 p-4 rounded-md shadow-sm">
                                        <div className="flex justify-between mb-2 dark:text-white">
                                            <span className="font-medium">
                                                {categoryIcons[category]} {category.charAt(0).toUpperCase() + category.slice(1)}
                                            </span>
                                            <span>{formatCurrency(amount)} spent</span>
                                        </div>
                                        <div className="bg-gray-200 dark:bg-gray-600 rounded-md h-4 overflow-hidden">
                                            <div
                                                className="bg-indigo-600 dark:bg-indigo-500 h-full rounded-md"
                                                style={{ width: `${percentage}%` }}
                                            ></div>
                                        </div>
                                        <div className="flex justify-between text-sm mt-1 dark:text-white">
                                            <span>Suggested: {formatCurrency(suggestedBudget)}</span>
                                            <span>{percentage.toFixed(1)}% of total</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
